version: "3.9"

services:
  guideatlas-agent:
    build: .
    container_name: guideatlas-agent
    env_file:
      - .env
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_REPO=${GITHUB_REPO}
      - GITHUB_BRANCH=${GITHUB_BRANCH}
      - REPO_ROOT=/workspace
    volumes:
      - ${GUIDEATLAS_HOST_PATH}:/workspace
    restart: "no"
